name: Heroku CD

on:
  workflow_run:
    workflows: ["Java CI with Gradle"]
    types: [completed]

jobs:
  deploy_staging:
    if: >-
      ${{
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.head_branch == 'staging'
      }}
    runs-on: ubuntu-latest
    environment:
      name: staging
    steps:
      - name: Checkout staging commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Deploy to Heroku staging
        env:
          HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}
          HEROKU_APP_NAME: ${{ secrets.HEROKU_APP_NAME_STAGING }}
        run: |
          if [ -z "$HEROKU_API_KEY" ] || [ -z "$HEROKU_APP_NAME" ]; then
            echo "Missing Heroku staging secrets."
            exit 1
          fi
          git remote add heroku "https://heroku:${HEROKU_API_KEY}@git.heroku.com/${HEROKU_APP_NAME}.git"
          git push heroku HEAD:main --force

      - name: Wait for staging app to boot
        run: sleep 30

      - name: Smoke test staging health endpoint
        env:
          HEROKU_APP_NAME: ${{ secrets.HEROKU_APP_NAME_STAGING }}
        run: |
          curl --fail --silent --show-error "https://${HEROKU_APP_NAME}.herokuapp.com/actuator/health" | grep '"status":"UP"'